<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sexpedition_application_1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>sexpedition_application_1</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      const bridge = {
        isAvailable: false,
        isExpanded: false,
        colorScheme: null,
        themeParams: {},
        initData: '',
        initDataUnsafe: null,
      };

      try {
        if (window.Telegram && window.Telegram.WebApp) {
          const app = window.Telegram.WebApp;
          app.ready();
          if (!app.isExpanded) {
            app.expand();
          }
          bridge.isAvailable = true;
          bridge.isExpanded = !!app.isExpanded;
          bridge.colorScheme = app.colorScheme || null;
          bridge.themeParams = app.themeParams || {};
          bridge.initData = app.initData || '';
          bridge.initDataUnsafe = app.initDataUnsafe || null;
        }
      } catch (_) {}

      window.sexpTelegramWebAppBridge = {
        getState: function () {
          return JSON.stringify(bridge);
        },
        close: function () {
          try {
            if (window.Telegram && window.Telegram.WebApp) {
              window.Telegram.WebApp.close();
            }
          } catch (_) {}
        },
      };
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
